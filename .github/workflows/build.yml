name: Build SpendSense APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: List files to debug structure
        run: find . -name "gradlew" 2>/dev/null && ls -la SpendSense/ || echo "SpendSense folder not found"

      - name: Grant execute permission to gradlew
        run: chmod +x SpendSense/gradlew

      - name: Build Debug APK
        working-directory: SpendSense
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpendSense-Debug-APK
          path: SpendSense/app/build/outputs/apk/debug/app-debug.apk
