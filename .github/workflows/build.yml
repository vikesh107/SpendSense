name: Build SpendSense APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1-bin.zip
          unzip -q gradle-8.1-bin.zip
          echo "$PWD/gradle-8.1/bin" >> $GITHUB_PATH

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build Debug APK
        working-directory: SpendSense
        run: gradle assembleDebug --stacktrace --info 2>&1 | grep -E "^e:|error:|Error:|warning:|FAILED|BUILD" | head -60 || gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpendSense-Debug-APK
          path: SpendSense/app/build/outputs/apk/debug/app-debug.apk
